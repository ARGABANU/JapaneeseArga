<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Hiragana Game</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#f0fdf4,#dbeafe);
  min-height:100vh;
}

header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.score{
  background:#fff;
  padding:10px 14px;
  border-radius:10px;
  font-weight:bold;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.board{
  display:flex;
  justify-content:space-between;
  margin-top:30px;
}

.column{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  background:#fff;
  padding:14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  min-width:130px;
  text-align:center;
  transition:0.2s;
  box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

.item:hover{transform:scale(1.05);}

.left .item{border-left:5px solid #3b82f6;}
.right .item{border-right:5px solid #22c55e;}

.selected{
  outline:3px solid #60a5fa;
}

.correct{
  background:#dcfce7 !important;
  cursor:default;
  pointer-events:none;
}

.finish{
  display:none;
  text-align:center;
  margin-top:40px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div><b>Match Game</b></div>
  <div class="score">Score: <span id="score">0</span></div>
</header>

<div class="container">

  <div class="board" id="board">
    <div class="column left" id="left"></div>
    <div class="column right" id="right"></div>
  </div>

  <div class="finish" id="finish">
    <h1>🎉 Selesai!</h1>
    <h2 id="result"></h2>
    <button onclick="location.reload()">Main Lagi</button>
  </div>

</div>

<script>

/* ===== DATA ===== */
const pool = [

  // Warna / Sifat
  ["あかい","akai","merah"],
  ["あおい","aoi","biru"],

  // Tempat / Alam
  ["さか","saka","tanjakan"],
  ["せかい","sekai","dunia"],
  ["くに","kuni","negara"],
  ["やま","yama","gunung"],
  ["かわ","kawa","sungai"],
  ["うみ","umi","laut"],
  ["ゆき","yuki","salju"],
  ["あめ","ame","hujan"],
  ["くも","kumo","awan"],

  // Hewan
  ["うま","uma","kuda"],
  ["ねこ","neko","kucing"],
  ["いぬ","inu","anjing"],
  ["さかな","sakana","ikan"],
  ["かに","kani","kepiting"],
  ["さる","saru","monyet"],
  ["むし","mushi","serangga"],

  // Bagian Tubuh
  ["みみ","mimi","telinga"],
  ["め","me","mata"],
  ["はな","hana","hidung / bunga"],
  ["くち","kuchi","mulut"],
  ["て","te","tangan"],
  ["あし","ashi","kaki"],
  ["つの","tsuno","tanduk"],
  ["ほね","hone","tulang"],

  // Benda Sehari-hari
  ["いす","isu","kursi"],
  ["え","e","gambar"],
  ["しお","shio","garam"],
  ["かい","kai","kerang"],
  ["はかり","hakari","timbangan"],
  ["せんす","sensu","kipas"],
  ["かばん","kaban","tas"],
  ["ふえ","fue","suling"],
  ["いと","ito","benang"],
  ["はし","hashi","jembatan"],
  ["しろ","shiro","kastil"],
  ["へい","hei","tembok"],
  ["ほし","hoshi","bintang"],

  // Makanan / Dapur
  ["さけ","sake","salmon / sake"],
  ["すいか","suika","semangka"],

  // Waktu / Musim
  ["あき","aki","musim gugur"],
  ["なつ","natsu","musim panas"],
  ["きせつ","kisetsu","musim"],
  ["おととい","ototoi","kemarin lusa"],
  ["あした","ashita","besok"],
  ["らいねん","rainen","tahun depan"],

  // Sekolah / Tulisan
  ["しかく","shikaku","kotak / persegi"],
  ["きそく","kisoku","peraturan"],
  ["うそ","uso","bohong"],
  ["へんか","henka","perubahan"],

  // Perasaan / Pikiran
  ["ゆめ","yume","mimpi"],
  ["こころ","kokoro","hati / perasaan"],

  // Alam & Tumbuhan
  ["はな","hana","bunga"],
  ["にわ","niwa","taman"],
  ["さくら","sakura","bunga sakura"],

  // Kata Kerja / Aktivitas
  ["あう","au","bertemu"],
  ["かいもの","kaimono","belanja"],

  // Tempat / Posisi
  ["そこ","soko","di situ"],
  ["ここ","koko","di sini"],
  ["えき","eki","stasiun"]

];

/* ambil 10 */
const gameData = pool.sort(()=>Math.random()-0.5).slice(0,10);

let score = 0;
let selectedLeft = null;

/* split kiri kanan */
let leftData = [...gameData].sort(()=>Math.random()-0.5);
let rightData = [...gameData].sort(()=>Math.random()-0.5);

const leftBox = document.getElementById("left");
const rightBox = document.getElementById("right");

/* LEFT */
leftData.forEach((item,idx)=>{
  const div = document.createElement("div");
  div.className="item";
  div.innerText = item[0];

  div.onclick = ()=>{
    if(div.classList.contains("correct")) return;

    document.querySelectorAll(".left .item")
    .forEach(i=>i.classList.remove("selected"));

    div.classList.add("selected");
    selectedLeft = item;
  };

  leftBox.appendChild(div);
});

/* RIGHT */
rightData.forEach((item,idx)=>{
  const div = document.createElement("div");
  div.className="item";
  div.innerText = item[1];

  div.onclick = ()=>{

    if(!selectedLeft) return;
    if(div.classList.contains("correct")) return;

    if(selectedLeft[0] === item[0]){

      div.classList.add("correct");
      document.querySelectorAll(".left .item").forEach(el=>{
        if(el.innerText === selectedLeft[0]){
          el.classList.add("correct");
        }
      });

      score++;
      document.getElementById("score").innerText = score;

      selectedLeft = null;

      if(score === 10){
        finishGame();
      }

    } else {
      // salah → reset selection
      document.querySelectorAll(".left .item")
      .forEach(i=>i.classList.remove("selected"));

      selectedLeft = null;
    }
  };

  rightBox.appendChild(div);
});

function finishGame(){
  document.getElementById("board").style.display="none";
  document.getElementById("finish").style.display="block";

  document.getElementById("result").innerText =
    `selamat anda menyelesaikan soalgame sebanyak ${score}`;
}

</script>

</body>
</html>
