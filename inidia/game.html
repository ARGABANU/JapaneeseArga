<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Japanese Practice</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 420px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .problem {
      background: #eef3ff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .hint { background: orange; }
    .mic { background: green; color: white; }
    .next { background: #4a6cf7; color: white; }

    .result {
      margin-top: 15px;
      white-space: pre-line;
      font-weight: bold;
    }

    .speech {
      font-size: 14px;
      margin-top: 10px;
    }

  </style>
</head>
<body>

<div class="container">
  <h2>🗾 Japanese Practice</h2>

  <div class="problem" id="problem"></div>

  <button class="hint" onclick="showHint()">💡 Hint</button>
  <button class="mic" onclick="startRecognition()">🎤 Speak</button>
  <button class="next" onclick="nextQuestion()">➡ Next</button>

  <div class="speech" id="speech"></div>
  <div class="result" id="result"></div>
</div>

<script>
const questions = [
{
  problem: "Greeting first time",
  answer: [
    "こんにちははじめまして",
    "こんにちは初めまして"
  ],
  parts: ["こんにちは", "はじめまして"],
  hint: "Remember Konnichiwa itu halo"
},
{
  problem: "Introduce yourself",
  answer: [
    "わたしはあるがです"
  ],
  parts: ["わたし","は","あるが","です"],
  hint: "Remember Watashi itu aku"
},
{
  problem: "Ask origin",
  answer: [
    "どこからきましたか",
    "どこから来ましたか"
  ],
  parts: ["どこ","から","きました","か"],
  hint: "Remember Doko itu dimana"
},
{
  problem: "Say goodbye",
  answer: [
    "さようならまたね"
  ],
  parts: ["さようなら","またね"],
  hint: "Remember Mata ne itu see you later"
},
{
  problem: "Ask condition",
  answer: [
    "げんきですか",
    "元気ですか"
  ],
  parts: ["げんき","です","か"],
  hint: "Remember genki itu nanya kabar"
},
{
  problem: "Ask age",
  answer: [
    "なんさいですか",
    "何歳ですか"
  ],
  parts: ["なんさい","です","か"],
  hint: "Remember sai itu umur"
},
{
  problem: "Say thank you",
  answer: [
    "ありがとうございます"
  ],
  parts: ["ありがとう","ございます"],
  hint: "Remember arigatou itu terima kasih"
},
{
  problem: "Apologize",
  answer: [
    "すみません"
  ],
  parts: ["すみません"],
  hint: "Remember sumimasen itu maaf"
},
{
  problem: "Ask price",
  answer: [
    "いくらですか"
  ],
  parts: ["いくら","です","か"],
  hint: "Remember ikura itu berapa"
},
{
  problem: "Ask name",
  answer: [
    "あなたのなまえはなんですか",
    "あなたの名前は何ですか"
  ],
  parts: ["あなた","の","なまえ","は","なん","です","か"],
  hint: "Remember anata no itu milikmu"
}
];
const kanjiMap = {
  "私": "わたし",
  "初めまして": "はじめまして",
  "来ました": "きました",
  "名前": "なまえ",
  "元気": "げんき",
  "何歳": "なんさい",
  "何": "なん"
};
let current = 0;

function loadQuestion() {
  document.getElementById("problem").innerHTML =
    "<strong>Problem Case:</strong><br>" + questions[current].problem;

  document.getElementById("result").textContent = "";
  document.getElementById("speech").textContent = "";
}

function showHint() {
  alert(questions[current].hint);
}

function nextQuestion() {
  current++;
  if (current >= questions.length) current = 0;
  loadQuestion();
}

function startRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Browser tidak support 😢");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.start();

  document.getElementById("result").textContent = "🎧 Listening...";

  recognition.onresult = function(event) {
    let speech = event.results[0][0].transcript;
    document.getElementById("speech").textContent = "You said: " + speech;

    checkAnswer(speech);
  };
}
function normalize(text) {

  for (let kanji in kanjiMap) {
    text = text.replaceAll(kanji, kanjiMap[kanji]);
  }

  return text
    .toLowerCase()
    .replace(/[？?！!。、,]/g, "")
    .replace(/[ー〜～]/g, "")
    .replace(/\s/g, "")
    .trim();
}
function similarity(a, b) {

  let same = 0;

  for (let i = 0; i < Math.min(a.length, b.length); i++) {
    if (a[i] === b[i]) same++;
  }

  return same / Math.max(a.length, b.length);
}
function checkAnswer(speech) {

  const user = normalize(speech);

  const question = questions[current];

  // cek apakah cocok dengan salah satu jawaban
  const isCorrect = question.answer.some(ans => {
    return normalize(ans) === user;
  });

  if (isCorrect) {
    document.getElementById("result").textContent =
      "✅ 正解！ Excellent!";
    return;
  }
  const almostCorrect = question.answer.some(ans => {
  return similarity(user, normalize(ans)) >= 0.85;
});

if (almostCorrect) {
  document.getElementById("result").textContent =
    "🟡 Hampir benar! Coba ulangi sedikit lagi.";
  return;
}
  // cek bagian yang hilang
  let missing = [];

  question.parts.forEach(part => {

    const p = normalize(part);

    if (!user.includes(p)) {
      missing.push(part);
    }
  });

  let feedback = "❌ ちがいます\n";

  if (missing.length > 0) {
    feedback += "\nKurang di bagian:\n";

    missing.forEach(m => {
      feedback += "- " + m + "\n";
    });
  }

  feedback += "\n👉 Jawaban benar:\n";
  feedback += question.answer[0];

  document.getElementById("result").textContent =
    feedback;
}

loadQuestion();

</script>

</body>
</html>
